name: Publish

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"  # Push events matching v*, e.g. v0.3.0
  release:
    types: [published]

jobs:
  test-pypi:
    name: Test PyPI (dry-run)
    runs-on: ubuntu-latest
    # Only run on tag pushes, not release published events
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write  # OIDC for trusted publishing
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Publish to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    # Only publish to real PyPI after an explicit GitHub Release is published.
    # Tag pushes go to Test PyPI only.
    if: github.event_name == 'release'
    environment: release
    permissions:
      id-token: write  # OIDC for trusted publishing
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
