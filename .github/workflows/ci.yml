name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install "setuptools<77" wheel
          python -m pip install -e ".[hrr]"
          python -m pip install pytest pytest-cov ruff

      - name: Ruff check
        run: |
          # Temporary baseline: legacy source currently has pre-existing Ruff issues,
          # especially invalid syntax in src/memory_etch/translator. Keep PR3 scoped
          # to CI/config tests, then tighten this gate in a later cleanup slice.
          python -m ruff check tests/test_ci_coverage_config.py --no-fix

      - name: Ruff format check
        run: |
          # Temporary baseline mirrors Ruff check until translator/source debt is fixed.
          python -m ruff format tests/test_ci_coverage_config.py --check

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short --cov=memory_etch --cov-fail-under=80 --cov-report=xml --cov-report=html

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-${{ matrix.python-version }}
          path: |
            coverage.xml
            htmlcov
